name: Deploy ePower to VPS

on:
  push:
    branches:
      - main

env:
  VPS_HOST: 80.248.77.205
  APP_PATH: /var/www/epower
  BACKUP_PATH: /var/www/epower-backup
  SERVICE_NAME: epower

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    # -----------------------------
    # Cache NuGet packages
    # -----------------------------

    - name: Cache NuGet
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    # -----------------------------
    # Setup .NET
    # -----------------------------

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "10.0.x"

    # -----------------------------
    # Restore dependencies
    # -----------------------------

    - name: Restore dependencies
      run: dotnet restore BlazorHero.CleanArchitecture.sln

    # -----------------------------
    # Build
    # -----------------------------

    - name: Build
      run: dotnet build BlazorHero.CleanArchitecture.sln --configuration Release --no-restore

    # -----------------------------
    # Publish
    # -----------------------------

    - name: Publish
      run: dotnet publish src/Server/Server.csproj -c Release -o publish

    # -----------------------------
    # SSH configuration
    # -----------------------------

    - name: Configure SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    # -----------------------------
    # Deploy
    # -----------------------------

    - name: Deploy to VPS
      env:
        DB_CONNECTION: ${{ secrets.DB_CONNECTION_STRING }}
        APP_SECRET: ${{ secrets.APP_SECRET }}
        MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        MEDIATR_KEY: ${{ secrets.MEDIATR_LICENSE_KEY }}
        CATVEND_VALIDATION: ${{ secrets.CATVEND_VALIDATION_CODE }}
        CATVEND_UNIT: ${{ secrets.CATVEND_UNIT }}
        CATVEND_USER: ${{ secrets.CATVEND_USERNAME }}
        CATVEND_PASS: ${{ secrets.CATVEND_PASSWORD }}
      run: |
        set -e

        echo "==== CONNECTING TO VPS ===="

        ssh -o StrictHostKeyChecking=no user@$VPS_HOST "

          set -e

          echo '=== ePower Deployment ==='

          echo '[1/7] Stopping service'
          sudo systemctl stop $SERVICE_NAME 2>/dev/null || true

          echo '[2/7] Backup current version'
          if [ -d '$APP_PATH' ]; then
            sudo rm -rf '$BACKUP_PATH'
            sudo cp -a '$APP_PATH' '$BACKUP_PATH'
          fi

          echo '[3/7] Cleaning target directory'
          sudo mkdir -p '$APP_PATH'
          sudo rm -rf '${APP_PATH:?}'/*
        "

        echo "[4/7] Uploading new version"

        scp -r publish/* user@$VPS_HOST:/tmp/epower-deploy/

        echo "[5/7] Writing environment secrets"

        ssh -o StrictHostKeyChecking=no user@$VPS_HOST "cat > /tmp/epower-env" <<ENVEOF
        ConnectionStrings__DefaultConnection=${DB_CONNECTION}
        AppConfiguration__Secret=${APP_SECRET}
        MailConfiguration__Password=${MAIL_PASSWORD}
        MediatR__LicenseKey=${MEDIATR_KEY}
        CatVendConfig__ValidationCode=${CATVEND_VALIDATION}
        CatVendConfig__Unit=${CATVEND_UNIT}
        CatVendConfig__Username=${CATVEND_USER}
        CatVendConfig__Password=${CATVEND_PASS}
        ENVEOF

        ssh -o StrictHostKeyChecking=no user@$VPS_HOST "

          set -e

          echo '[6/7] Setting permissions'

          sudo mkdir -p /etc/epower
          sudo mv /tmp/epower-env /etc/epower/env
          sudo chmod 600 /etc/epower/env
          sudo chown root:root /etc/epower/env

          sudo cp -r /tmp/epower-deploy/* '$APP_PATH'/
          rm -rf /tmp/epower-deploy

          sudo chown -R www-data:www-data '$APP_PATH' || true
          sudo chmod -R 755 '$APP_PATH'

          echo '[7/7] Restarting service'

          sudo systemctl daemon-reload
          sudo systemctl start $SERVICE_NAME
          sudo systemctl enable $SERVICE_NAME || true

          echo 'Checking service status...'

          if sudo systemctl is-active --quiet $SERVICE_NAME
          then
            echo 'Service started successfully'
          else
            echo 'Service failed to start, rolling back...'

            sudo systemctl stop $SERVICE_NAME || true

            sudo rm -rf '$APP_PATH'
            sudo mv '$BACKUP_PATH' '$APP_PATH'

            sudo systemctl start $SERVICE_NAME

            echo 'Rollback completed'
          fi

          echo 'Service status:'
          sudo systemctl status $SERVICE_NAME --no-pager -l

          echo 'Recent logs:'
          sudo journalctl -u $SERVICE_NAME -n 50 --no-pager
        "
